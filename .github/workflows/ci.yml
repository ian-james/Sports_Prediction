name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Run Ruff Check
        run: |
          cd backend
          uv run ruff check .

      - name: Run Ruff Format (Check only)
        run: |
          cd backend
          uv run ruff format --check .

      - name: Type Check with Mypy
        run: |
          cd backend
          uv run mypy .
